services:
  postgres:
    image: postgres:16
    container_name: psyc681-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: psyc681_ideology
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d psyc681_ideology"]
      interval: 5s
      timeout: 5s
      retries: 10
